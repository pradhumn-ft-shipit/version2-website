# ⚠️ REFERENCE / MIRROR ONLY — this file is NOT live.
#
# The Render Static Site was created manually in the dashboard, so Render does
# NOT read this file (it only applies render.yaml for services created from a
# Blueprint). The actual source of truth is the Render dashboard:
#   - Redirects/Rewrites tab: the routes below (redirects above the SPA rewrite)
#   - Environment tab: NODE_VERSION and VITE_CONTACT_API_URL below
# Keep this file in sync with the dashboard by hand so it documents the intended
# config. To make it live instead, connect the repo to Render as a Blueprint.

services:
  - type: web
    name: version2-website
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      # Pin Node to match GitHub Actions (Render otherwise defaults to 24.x).
      - key: NODE_VERSION
        value: "20"
      # The contact form lives on the Cloudflare worker (*.pages.dev), not Render.
      - key: VITE_CONTACT_API_URL
        value: https://version2-website.pages.dev/api/contact
    # Redirect rules MUST come before the SPA catch-all rewrite so they win.
    routes:
      - type: redirect
        source: /fpa
        destination: /contact
      - type: redirect
        source: /aon
        destination: /contact
      - type: redirect
        source: /onepagecrm
        destination: /contact
      # SPA deep-link fallback — every other path serves the app shell so
      # React Router can handle it (and hard refreshes on /blog/<post> work).
      - type: rewrite
        source: /*
        destination: /index.html
