# Render Blueprint (Infrastructure as Code) — the live source of truth for the
# static site's build, env vars, and routing.
#
# IMPORTANT: `name` MUST exactly match the existing Render service
# (version2-website). On a matching name, Render ADOPTS the existing service and
# applies this config to it. On a mismatch, Render creates a DUPLICATE service
# (with a name suffix) that won't have the custom domain — so don't rename this.
#
# To activate: Render dashboard → New → Blueprint → pick this repo/branch →
# Apply. After that, every push to main reconciles the service to this file.

services:
  - type: web
    name: version2-website
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      # Pin Node to match GitHub Actions (Render otherwise defaults to 24.x).
      - key: NODE_VERSION
        value: "20"
      # The contact form lives on the Cloudflare worker (*.pages.dev), not Render.
      - key: VITE_CONTACT_API_URL
        value: https://version2-website.pages.dev/api/contact
    # Redirect rules MUST come before the SPA catch-all rewrite so they win.
    routes:
      # /fpa is a real page now (FPA-member Meeting Assistant landing), not a redirect.
      - type: redirect
        source: /aon
        destination: /contact
      - type: redirect
        source: /onepagecrm
        destination: /contact
      # SPA deep-link fallback — every other path serves the app shell so
      # React Router can handle it (and hard refreshes on /blog/<post> work).
      - type: rewrite
        source: /*
        destination: /index.html
