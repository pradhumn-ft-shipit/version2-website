name: path-guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  path-guard:
    name: path-guard
    runs-on: ubuntu-latest
    steps:
      - name: Verify blog-team PRs only touch content/tejas/<YYYY-MM-DD>/
        uses: actions/github-script@v7
        with:
          script: |
            // Blog-team GitHub usernames. Add handles here to give them
            // restricted-folder access. Anyone NOT in this list bypasses
            // the path guard (the assumption is they're trusted maintainers).
            const BLOG_TEAM = [
              'tejasspatil'
            ];
            const ALLOWED_RE = /^content\/tejas\/\d{4}-\d{2}-\d{2}\/[^/]+/;

            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (!BLOG_TEAM.includes(author)) {
              core.info(`Author "${author}" is not in the blog-team allowlist; path guard does not apply.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const offending = files
              .map((f) => f.filename)
              .filter((p) => !ALLOWED_RE.test(p));

            if (offending.length) {
              core.setFailed(
                `Blog-team author "${author}" touched ${offending.length} file(s) outside content/tejas/<YYYY-MM-DD>/:\n` +
                  offending.map((f) => '  - ' + f).join('\n')
              );
              return;
            }

            core.info(`All ${files.length} changed files are within content/tejas/<YYYY-MM-DD>/.`);

  build-smoke:
    name: build-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate blog content (frontmatter, topics, image refs)
        run: npm run blog:build
