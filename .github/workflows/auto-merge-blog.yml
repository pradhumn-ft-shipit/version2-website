name: auto-merge-blog

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for clean blog-team PRs
        uses: actions/github-script@v7
        with:
          script: |
            // Keep this list in sync with .github/workflows/path-guard.yml
            const BLOG_TEAM = [
              'tejasspatil'
            ];
            const ALLOWED_RE = /^content\/tejas\/\d{4}-\d{2}-\d{2}\/[^/]+/;

            const pr = context.payload.pull_request;

            if (pr.draft) {
              core.info('Draft PR — auto-merge not enabled.');
              return;
            }
            if (!BLOG_TEAM.includes(pr.user.login)) {
              core.info(`Author "${pr.user.login}" not in blog team — auto-merge not enabled.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const offending = files.filter((f) => !ALLOWED_RE.test(f.filename));
            if (offending.length) {
              core.info(`PR touches ${offending.length} file(s) outside content/tejas/<YYYY-MM-DD>/ — auto-merge not enabled.`);
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                   enablePullRequestAutoMerge(input: {
                     pullRequestId: $pullRequestId,
                     mergeMethod: SQUASH
                   }) {
                     pullRequest { number }
                   }
                 }`,
                { pullRequestId: pr.node_id }
              );
              core.info(`Auto-merge enabled for PR #${pr.number}.`);
            } catch (err) {
              core.warning(
                `Could not enable auto-merge for PR #${pr.number}: ${err.message}. ` +
                  'Check that "Allow auto-merge" is enabled in repo Settings → General.'
              );
            }
